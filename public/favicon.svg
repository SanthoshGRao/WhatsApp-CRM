<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="g" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFCE44"/>
      <stop offset="100%" stop-color="#E29400"/>
    </radialGradient>
  </defs>
  <!-- Main thick outer ring -->
  <path fill="url(#g)" d="M50 2 A48 48 0 1 1 2 50 A48 48 0 0 1 50 2 Z m0 16 A32 32 0 1 0 82 50 A32 32 0 0 0 50 18 Z"/>
  
  <!-- Outer teeth (24 teeth) -->
  <g fill="url(#g)">
    <polygon points="46,0 54,0 52,10 48,10" />
    <polygon points="46,0 54,0 52,10 48,10" transform="rotate(15 50 50)" />
    <polygon points="46,0 54,0 52,10 48,10" transform="rotate(30 50 50)" />
    <polygon points="46,0 54,0 52,10 48,10" transform="rotate(45 50 50)" />
    <polygon points="46,0 54,0 52,10 48,10" transform="rotate(60 50 50)" />
    <polygon points="46,0 54,0 52,10 48,10" transform="rotate(75 50 50)" />
    <polygon points="46,0 54,0 52,10 48,10" transform="rotate(90 50 50)" />
    <polygon points="46,0 54,0 52,10 48,10" transform="rotate(105 50 50)" />
    <polygon points="46,0 54,0 52,10 48,10" transform="rotate(120 50 50)" />
    <polygon points="46,0 54,0 52,10 48,10" transform="rotate(135 50 50)" />
    <polygon points="46,0 54,0 52,10 48,10" transform="rotate(150 50 50)" />
    <polygon points="46,0 54,0 52,10 48,10" transform="rotate(165 50 50)" />
    <polygon points="46,0 54,0 52,10 48,10" transform="rotate(180 50 50)" />
    <polygon points="46,0 54,0 52,10 48,10" transform="rotate(195 50 50)" />
    <polygon points="46,0 54,0 52,10 48,10" transform="rotate(210 50 50)" />
    <polygon points="46,0 54,0 52,10 48,10" transform="rotate(225 50 50)" />
    <polygon points="46,0 54,0 52,10 48,10" transform="rotate(240 50 50)" />
    <polygon points="46,0 54,0 52,10 48,10" transform="rotate(255 50 50)" />
    <polygon points="46,0 54,0 52,10 48,10" transform="rotate(270 50 50)" />
    <polygon points="46,0 54,0 52,10 48,10" transform="rotate(285 50 50)" />
    <polygon points="46,0 54,0 52,10 48,10" transform="rotate(300 50 50)" />
    <polygon points="46,0 54,0 52,10 48,10" transform="rotate(315 50 50)" />
    <polygon points="46,0 54,0 52,10 48,10" transform="rotate(330 50 50)" />
    <polygon points="46,0 54,0 52,10 48,10" transform="rotate(345 50 50)" />
  </g>

  <!-- Inner solid ring with 6 spokes -->
  <circle cx="50" cy="50" r="16" fill="url(#g)"/>
  <circle cx="50" cy="50" r="8" fill="#FFF"/>
  <g fill="url(#g)">
    <rect x="46" y="16" width="8" height="68" />
    <rect x="46" y="16" width="8" height="68" transform="rotate(60 50 50)" />
    <rect x="46" y="16" width="8" height="68" transform="rotate(120 50 50)" />
  </g>

  <!-- Keyway notch -->
  <rect x="47" y="38" width="6" height="6" fill="url(#g)"/>
</svg>